<!doctype html>
<html lang="fr" class="h-dvh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- tailwindcss -->
    <link rel="stylesheet" href="styles.css" />
    <title>Chat-app with tailwindcss</title>
  </head>
  <body class="h-dvh bg-slate-400">
    <div
      class="mx-auto flex h-screen max-w-screen-xl flex-col items-center justify-center bg-slate-300"
      id="registerDiv"
    >
      <form
        class="flex w-72 flex-col gap-4 rounded-xl bg-slate-400/15 p-4 py-8 text-center"
        id="formPseudo"
      >
        <h1 class="text-4xl font-bold">Se connecter</h1>
        <input
          type="text"
          id="pseudoInput"
          autocomplete="off"
          placeholder="Pseudo (15 car. max)"
          maxlength="15"
          class="h-10 rounded-lg p-2 outline-none transition-all duration-300 ease-in-out focus:ring-2 focus:ring-black"
        />
        <button
          class="mx-auto w-48 rounded-lg bg-cyan-800 py-2 font-semibold text-white hover:bg-cyan-900"
          id="submitPseudo"
        >
          Envoyer
        </button>
      </form>
      <h1 class="absolute translate-y-36 text-black/60">
        Made by : <br />discord:
        <span class="font-semibold italic">Codebarou</span>
      </h1>
    </div>
    <div
      class="relative mx-auto hidden h-dvh max-w-screen-xl flex-col bg-slate-300"
      id="chatScreen"
    >
      <div
        class="flex h-20 w-full items-center justify-between bg-slate-700 p-4 shadow-[rgba(0,_0,_0,_0.4)_0px_30px_90px]"
        id="headerChatScreen"
      >
        <h1 class="text-3xl font-bold text-white">Chatapp</h1>
        <button
          class="rounded-lg bg-white p-2.5 text-black hover:bg-slate-300"
          id="leftBtn"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-message-circle-x"
          >
            <path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z" />
            <path d="m15 9-6 6" />
            <path d="m9 9 6 6" />
          </svg>
        </button>
      </div>
      <div class="flex-grow overflow-y-auto p-5" id="chat">
        <div
          class="absolute bottom-14 left-3 hidden h-10 w-16 items-center justify-between rounded-xl bg-gray-200 px-2"
        >
          <span class="size-3 animate-pulse rounded-full bg-gray-600"></span>
          <span
            class="size-3 animate-pulse rounded-full bg-gray-600 [animation-delay:600ms]"
          ></span>
          <span
            class="size-3 animate-pulse rounded-full bg-gray-600 [animation-delay:850ms]"
          ></span>
        </div>
      </div>
      <form
        action=""
        class="flex h-12 w-full flex-none shadow-[0px_-24px_20px_8px_#00000024]"
        id="formMsg"
      >
        <input
          type="text"
          id="msg"
          autocomplete="off"
          placeholder="Votre message... (550 car. max)"
          maxlength="550"
          class="h-full w-5/6 p-2.5 outline-none"
        />
        <button
          class="flex w-1/6 items-center justify-center bg-slate-700 font-semibold text-white hover:bg-slate-800 xl:w-1/6"
        >
          <span class="hidden xl:flex">Envoyer</span>
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="flex xl:hidden"
          >
            <path d="m22 2-7 20-4-9-9-4Z" />
            <path d="M22 2 11 13" />
          </svg>
        </button>
      </form>
    </div>
    <!-- socket io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $(function () {
        var socket = io();
        var pseudo = ""; 
        var currentUserId; 

        socket.on("connect", function () {
          currentUserId = socket.id;
        });

        $("#formPseudo").submit(function (e) {
          e.preventDefault();

          pseudo = $("#pseudoInput").val();
          // si le pseudo est vide
          if (pseudo.trim() === "") {
            alert("Veuillez entrer un pseudo");
            return false;
          } else {
            socket.emit("pseudo joined", {
              pseudo: pseudo,
              userId: currentUserId,
            });

            $("#registerDiv").addClass("hidden");
            $("#chatScreen").removeClass("hidden");
            $("#chatScreen").addClass("flex");
          }
        });

        $("#leftBtn").click(function () {
          $("#registerDiv").removeClass("hidden");
          $("#chatScreen").addClass("hidden");
          $("#chatScreen").removeClass("flex");
        });

        // à l'envoie du message alors :
        $("#formMsg").submit(function (e) {
          e.preventDefault();

          socket.emit("chat message", {
            message: $("#msg").val(),
            pseudo: pseudo,
            userId: currentUserId,
          });
          $("#msg").val("");

          return false;
        });

        // Gestion de la réception des messages du serveur
        socket.on("chat message", function (data) {
          if (data.message.trim() !== "") {
            var newMessage = $("<p>").text(data.message);
            var pseudoElement;

            if (data.userId === currentUserId) {
              // client
              newMessage.addClass(
                "mb-5 ml-auto flex w-fit max-w-80 flex-col break-words rounded bg-teal-600 p-2.5",
              );
              pseudoElement = $("<span>").text("Vous :");
              pseudoElement.addClass("text-right font-bold text-white");
            } else {
              // autres pov client
              newMessage.addClass(
                "mb-5 mr-auto flex w-fit max-w-80 flex-col break-words rounded bg-blue-400 p-2.5",
              );
              pseudoElement = $("<span>").text(data.pseudo + " :");
              pseudoElement.addClass("text-left font-bold text-white");
            }

            newMessage.prepend(pseudoElement);

            $("#chat").append(newMessage);
            $("#msg").blur();
          }

          // scroll bar dynamique
          var chatContainer = $("#chat");
          chatContainer.scrollTop(chatContainer[0].scrollHeight);
        });

        socket.on("pseudo joined", function (data) {
          var newPseudo = $("<p>");
          newPseudo.addClass("mb-5 text-center font-medium italic");
          if (data.userId === currentUserId) {
            newPseudo.addClass("text-green-700");
            newPseudo.text("Vous avez rejoins en tant que " + data.pseudo);
          } else {
            newPseudo.addClass("text-black");
            newPseudo.text(data.pseudo + " a rejoins la discussion");
          }
          $("#chat").append(newPseudo);
        });
      });
    </script>
    <h1 class="mb-5 text-center font-medium italic"></h1>
  </body>
</html>
